<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>U-CSM</title>
</head>
<body>
<body>
<h1>Students List <a href="/">Home Page.</a></h1>
<table>
    <thead>
    <tr>
        <th>classmate ID</th>
        <th>First Name</th>
        <th>Last Name</th>
        <th>Group Name</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="student : ${classmates}">
        <td th:text="${student.ID}"></td>
        <td th:text="${student.firstName}"></td>
        <td th:text="${student.lastName}"></td>
        <td th:text="${student.groupName}"></td>
    </tr>
    </tbody>
</table>
</body>
</body>
</html>
